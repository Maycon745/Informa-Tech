<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabrieli & David - 29.08.2026</title>
    <style>
        body {
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        
        .header {
            background-image: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .header-content {
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 400;
        }
        
        .couple-names {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }
        
        .name {
            font-size: 2.5rem;
            margin: 0 15px;
        }
        
        .ampersand {
            font-size: 3rem;
            color: #808000;
        }
        
        .date {
            font-size: 1.8rem;
            margin-top: 20px;
            border-top: 1px solid white;
            border-bottom: 1px solid white;
            padding: 10px 0;
            display: inline-block;
        }
        
        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #808000;
        }
        
        .location {
            margin-bottom: 40px;
        }
        
        .address {
            font-size: 1.2rem;
            margin: 20px 0;
        }
        
        .map-link {
            display: inline-block;
            background-color: #808000;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .map-link:hover {
            background-color: #6b6b00;
        }
        
        .rsvp-form {
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
        }
        
        .submit-btn {
            background-color: #808000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: block;
            margin: 30px auto 0;
        }
        
        .submit-btn:hover {
            background-color: #6b6b00;
        }
        
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 30px 0;
            margin-top: 50px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .name {
                font-size: 1.8rem;
            }
            
            .ampersand {
                font-size: 2rem;
            }
            
            .date {
                font-size: 1.3rem;
            }
            
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Estamos nos casando!</h1>
            <div class="couple-names">
                <div class="name">Gabrieli</div>
                <div class="ampersand">&</div>
                <div class="name">David</div>
            </div>
            <div class="date">29 de Agosto de 2026</div>
        </div>
    </div>
    
    <div class="section">
        <h2 class="section-title">Localização</h2>
        <div class="location">
            <p class="address">Estr. Mun. Santa Luzia, Bairro - Ribeirão Acima</p>
            <p class="address">Nazaré Paulista - SP, 12960-000</p>
            <a href="https://maps.app.goo.gl/UKutd5NLTuiQybuN7" class="map-link" target="_blank">Ver no Google Maps</a>
        </div>
    </div>
    
    <div class="section">
        <h2 class="section-title">Confirmação de Presença</h2>
        <form class="rsvp-form">
            <div class="form-group">
                <label for="name">Nome completo</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Telefone</label>
                <input type="tel" id="phone" name="phone">
            </div>
            
            <div class="form-group">
                <label for="guests">Número de acompanhantes</label>
                <select id="guests" name="guests">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Mensagem para os noivos (opcional)</label>
                <textarea id="message" name="message" rows="4"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Confirmar Presença</button>
        </form>
    </div>
    
    <footer>
        <p>Gabrieli & David - 29.08.2026</p>
    </footer>
    
    <script>
        document.querySelector('.rsvp-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Obrigado por confirmar sua presença! Entraremos em contato em breve.');
            this.reset();
        });
    </script>
</body>
</html>
